<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MedInfo Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-slate-100">

    <!-- Header -->

    <header class="bg-blue-600 shadow-lg">

        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">

            <div>

                <h1 class="text-3xl font-bold text-white">
                    💊 MedInfo Portal
                </h1>

                <p class="text-blue-100 mt-1">
                    Search medicine information instantly
                </p>

            </div>

            <span
                class="bg-white text-blue-600 px-4 py-2 rounded-full text-sm font-semibold">

                Healthcare Assistant

            </span>

        </div>

    </header>

    <!-- Hero -->

    <section class="max-w-5xl mx-auto px-6 mt-10">

        <div class="bg-white rounded-3xl shadow-lg p-8">

            <h2 class="text-3xl font-bold text-slate-800 mb-3">

                Find Medicine Details

            </h2>

            <p class="text-slate-500 mb-8">

                Search medicines to view their uses, dosage,
                side effects, age recommendations and precautions.

            </p>

            <form id="searchForm" class="flex flex-col md:flex-row gap-4">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by medicine, symptom or use..."
                    class="flex-1 border border-slate-300 rounded-xl px-5 py-4 text-lg outline-none focus:ring-4 focus:ring-blue-200 transition">

                <button
                    id="searchBtn"
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-4 rounded-xl transition">

                    Search

                </button>

            </form>

        </div>

    </section>

    <!-- Loading -->

    <section class="max-w-5xl mx-auto px-6">

        <div
            id="loading"
            class="hidden mt-8 bg-white rounded-2xl shadow p-6 text-center">

            <div class="loader mx-auto mb-4"></div>

            <p class="text-slate-600">

                Searching medicines...

            </p>

        </div>

    </section>

    <!-- Result Count -->

    <section class="max-w-5xl mx-auto px-6 mt-8">

        <p
            id="resultCount"
            class="text-slate-600 font-medium">

        </p>

    </section>

    <!-- Results -->

    <section
        id="results"
        class="max-w-5xl mx-auto px-6 py-8 grid md:grid-cols-2 gap-6">

    </section>

    <!-- Footer -->

    <footer class="mt-12 py-6 text-center text-slate-500 text-sm">

        © 2026 MedInfo Portal

    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>

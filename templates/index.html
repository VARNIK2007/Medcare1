<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedInfo Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <header class="bg-blue-600 text-white shadow-md py-6 mb-8">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2">
                💊 MedInfo Portal
            </h1>
            <span class="bg-blue-500 text-xs font-semibold px-2.5 py-1 rounded-full uppercase tracking-wider">
                Hackathon Build
            </span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 pb-12">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <h2 class="text-xl font-semibold mb-2">Search Medicine Information</h2>
            <p class="text-sm text-slate-500 mb-4">Quickly fetch dosage guides, uses, and important safety precautions.</p>
            
            <form id="searchForm" class="flex gap-2">
                <input 
                    type="text" 
                    id="medQuery" 
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    placeholder="Type medicine name or use (e.g., Paracetamol, Fever)..." 
                    required
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-3 rounded-xl transition-all shadow-sm active:scale-95"
                >
                    Search
                </button>
            </form>
        </div>

        <div id="results" class="space-y-6">
            </div>
    </main>

    <script src="{{ url_for('static', filename='uploads/script.js') }}"></script>
</body>
</html>
